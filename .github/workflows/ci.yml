# Goes in: .github/workflows/ci.yml
#
# This is your whole pipeline in one file. GitHub runs it automatically.
# - On every Pull Request -> it tests backend + frontend (this is "CI").
# - On every push to main  -> it tests, THEN deploys to EC2 (this is "CD").

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:        # lets you also run it manually from the Actions tab

jobs:
  backend-tests:
    runs-on: ubuntu-latest          # GitHub gives you a fresh Linux machine
    steps:
      - uses: actions/checkout@v4   # download your repo onto the machine
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r backend/requirements-dev.txt
      - name: Run tests
        working-directory: backend
        run: pytest -v

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json
      - name: Install dependencies
        working-directory: frontend-react
        run: npm ci                  # clean install from package-lock.json
      - name: Lint
        working-directory: frontend-react
        run: npm run lint
      - name: Unit tests
        working-directory: frontend-react
        run: npm test                # requires a "test" script (see notes)
      - name: Build
        working-directory: frontend-react
        run: npm run build           # proves the production build compiles

  deploy:
    needs: [backend-tests, frontend-tests]   # only runs if BOTH passed
    if: github.ref == 'refs/heads/main'      # ...and only on main, not PRs
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}      # set these 3 in repo Settings ->
          username: ${{ secrets.EC2_USER }}  # Secrets and variables -> Actions
          key: ${{ secrets.EC2_SSH_KEY }}    # the PRIVATE key (full contents)
          script_stop: true        # ← abort on first error
          script: |
            cd /home/ubuntu/RecipesApp
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            cd frontend-react && npm ci && npm run build && cd ..
            sudo systemctl restart recipesapp